name: Google Flights Scraper (Matrix Parallel)

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 時間 00:00 (香港時間早上 08:00) 執行
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  scrape-flights:
    runs-on: ubuntu-latest
    
    # 💡 核心變更：設定矩陣策略，同時開 6 台機器
    strategy:
      fail-fast: false # 即使其中一台機器出錯，其他機器也會繼續執行
      matrix:
        region: 
          - '台灣'
          - '中國內地'
          - '東北亞'
          - '東南亞'
          - '歐洲'
          - '大洋洲'
          - '中東與其他'
          - '美洲'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 升級至 Node 24 所需的新版 Python Setup (解決你的警告)
      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright supabase
          playwright install chromium

      - name: Run Scraper for ${{ matrix.region }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TARGET_REGION: ${{ matrix.region }} # 將矩陣的區域變數傳給 Python
        run: python scraper.py
