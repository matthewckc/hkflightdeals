name: Daily Flight Scraper

on:
  schedule:
    # ⚠️ 國際標準時間 (UTC) 16:00 等於香港時間 (HKT) 跨夜的 00:00 (零時零分)
    - cron: '0 16 * * *'
  workflow_dispatch: # 允許你手動點擊執行

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        pip install playwright supabase
        playwright install chromium
        
    - name: Execute Scraper
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONUNBUFFERED: "1" # 🌟 核心關鍵：強制 Python 即時輸出日誌，不進行快取快取
      run: python scraper.py
