<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ 全球 70 大城市平價機票監測艙</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <span class="bg-emerald-50 text-emerald-600 text-xs font-bold uppercase tracking-widest px-3 py-1 rounded-full">Global Flight Tracker</span>
            <h1 class="text-4xl font-black text-gray-900 tracking-tight mt-3 mb-2">🌍 全球 70 大航點特搜艙</h1>
            <p class="text-gray-500">每日更新 • 精準篩選 3 至 14 天完美行程</p>
        </header>
        
        <section class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8 space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-5">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">📍 搜尋目的地</label>
                    <input type="text" id="destInput" class="w-full p-3 bg-gray-50 border border-gray-100 rounded-2xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" placeholder="機場代碼 (如: NRT, TPE)">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">📅 預期出發日 (或之後)</label>
                    <input type="date" id="dateInput" class="w-full p-3 bg-gray-50 border border-gray-100 rounded-2xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider">💰 預算上限 (HKD)</label>
                        <span id="budgetVal" class="text-sm font-black text-blue-600">$15,000</span>
                    </div>
                    <input type="range" id="budgetInput" min="1000" max="25000" step="500" value="15000" class="w-full accent-blue-600 mt-2">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">📊 列表排序方式</label>
                    <select id="sortSelect" class="w-full p-3 bg-gray-50 border border-gray-100 rounded-2xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all font-medium">
                        <option value="price_asc">💰 價錢：由低至高</option>
                        <option value="alpha_asc">🔤 機場代碼：A - Z</option>
                    </select>
                </div>

                <div class="flex items-center sm:pt-6">
                    <label for="directCheck" class="flex items-center cursor-pointer select-none bg-gray-50 hover:bg-gray-100 px-4 py-3 rounded-2xl w-full transition-colors border border-gray-100">
                        <input type="checkbox" id="directCheck" class="w-5 h-5 text-blue-600 border-gray-300 rounded-xl focus:ring-blue-500 mr-3">
                        <span class="text-sm font-bold text-gray-700">⚡ 只看直飛航班</span>
                    </label>
                </div>
            </div>

            <div class="border-t border-gray-50 pt-4">
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">🌐 區域快捷篩選</label>
                <div class="flex flex-wrap gap-2" id="regionBtnGroup">
                    <button class="region-btn bg-blue-600 text-white text-sm font-bold px-4 py-2 rounded-xl transition-all shadow-sm" data-region="全部">全部地區</button>
                    <button class="region-btn bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-bold px-4 py-2 rounded-xl transition-all" data-region="台灣">台灣</button>
                    <button class="region-btn bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-bold px-4 py-2 rounded-xl transition-all" data-region="東北亞">東北亞 (日韓)</button>
                    <button class="region-btn bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-bold px-4 py-2 rounded-xl transition-all" data-region="東南亞">東南亞</button>
                    <button class="region-btn bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-bold px-4 py-2 rounded-xl transition-all" data-region="中國內地">中國內地</button>
                    <button class="region-btn bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-bold px-4 py-2 rounded-xl transition-all" data-region="歐洲">歐洲地區</button>
                    <button class="region-btn bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-bold px-4 py-2 rounded-xl transition-all" data-region="美洲">美洲地區</button>
                    <button class="region-btn bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-bold px-4 py-2 rounded-xl transition-all" data-region="大洋洲">大洋洲</button>
                    <button class="region-btn bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-bold px-4 py-2 rounded-xl transition-all" data-region="中東與其他">中東/其他</button>
                </div>
            </div>
        </section>

        <main id="flightList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20">
                <div class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-blue-600 rounded-full mb-4"></div>
                <p class="text-gray-400 font-medium">正在為您搜羅全球 70 大城市的平價金庫...</p>
            </div>
        </main>
    </div>

    <script>
        // ⚠️ 請在此處填入你的 Supabase 憑證（使用 anon public key）
        const SUPABASE_URL = "你的_SUPABASE_URL"; 
        const SUPABASE_KEY = "你的_ANON_PUBLIC_KEY"; 
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let allFlights = [];
        let currentRegion = "全部";

        async function loadFlights() {
            try {
                const { data, error } = await supabase
                    .from('flight_deals')
                    .select('*');

                if (error) throw error;
                allFlights = data || [];
                renderFlights();
            } catch (err) {
                console.error("資料撈取失敗:", err);
                document.getElementById('flightList').innerHTML = `
                    <div class="col-span-full text-center py-10 bg-red-50 text-red-600 rounded-2xl font-bold">
                        ❌ 連線失敗，請檢查 index.html 是否正確設定 URL 與 ANON_KEY。
                    </div>`;
            }
        }

        function renderFlights() {
            const dest = document.getElementById('destInput').value.trim().toUpperCase();
            const filterDate = document.getElementById('dateInput').value;
            const maxBudget = parseFloat(document.getElementById('budgetInput').value) || Infinity;
            const directOnly = document.getElementById('directCheck').checked;
            const sortMethod = document.getElementById('sortSelect').value;

            document.getElementById('budgetVal').innerText = `$${maxBudget.toLocaleString()}`;

            // 1. 過濾邏輯
            let filtered = allFlights.filter(f => {
                if (dest && !f.destination.toUpperCase().includes(dest)) return false;
                if (currentRegion !== '全部' && f.region !== currentRegion) return false;
                if (f.price > maxBudget) return false;
                if (directOnly && !f.is_direct) return false;
                if (filterDate && new Date(f.departure_date) < new Date(filterDate)) return false;
                return true;
            });

            // 2. 🌟 排序邏輯（實時切換）
            if (sortMethod === 'price_asc') {
                filtered.sort((a, b) => a.price - b.price); // 價錢低至高
            } else if (sortMethod === 'alpha_asc') {
                filtered.sort((a, b) => a.destination.localeCompare(b.destination)); // 機場代碼 A-Z
            }

            // 3. 生成網頁卡片
            const listHtml = filtered.map(f => `
                <div class="bg-white border border-gray-100 p-6 rounded-2xl shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all duration-200 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <span class="font-black text-2xl tracking-wide text-gray-800">${f.origin} <span class="text-blue-500 font-light text-xl">➔</span> ${f.destination}</span>
                            <span class="bg-blue-50 text-blue-600 text-xs px-3 py-1 rounded-full font-bold">${f.region}</span>
                        </div>
                        <div class="space-y-2 text-sm text-gray-600 mb-4">
                            <p class="flex items-center"><span class="mr-2">🛫</span>出發：<b class="text-gray-900">${f.departure_date}</b></p>
                            <p class="flex items-center"><span class="mr-2">🛬</span>回程：<b class="text-gray-900">${f.return_date}</b></p>
                            <p class="text-xs bg-gray-50 border border-gray-100 text-gray-500 inline-block px-2.5 py-1 rounded-lg font-medium">⏱️ 旅程總計：${f.duration_days} 天</p>
                        </div>
                    </div>
                    
                    <div class="mt-6 pt-4 border-t border-gray-50 flex justify-between items-center">
                        <div>
                            <span class="block text-xs font-bold text-gray-400 uppercase">含稅總價</span>
                            <span class="text-3xl font-black text-rose-500">$${f.price.toLocaleString()} <span class="text-xs text-gray-400 font-normal">HKD</span></span>
                        </div>
                        <a href="${f.booking_url}" target="_blank" rel="noopener noreferrer" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm transition-colors">
                            Google 訂票
                        </a>
                    </div>
                </div>
            `).join('');

            document.getElementById('flightList').innerHTML = listHtml || `
                <div class="col-span-full text-center py-16 text-gray-400 bg-white rounded-2xl border border-dashed border-gray-200">
                    <p class="text-lg font-bold mb-1">🔍 找不到符合當前條件的機票</p>
                    <p class="text-sm">試著切換排序、調高預算或放寬日期限制！</p>
                </div>`;
        }

        // 地區按鈕點擊切換效果
        document.querySelectorAll('.region-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.region-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white', 'shadow-sm');
                    b.classList.add('bg-gray-100', 'text-gray-600', 'hover:bg-gray-200');
                });
                this.classList.remove('bg-gray-100', 'text-gray-600', 'hover:bg-gray-200');
                this.classList.add('bg-blue-600', 'text-white', 'shadow-sm');
                
                currentRegion = this.getAttribute('data-region');
                renderFlights();
            });
        });

        // 監聽所有篩選與排序元件的變化
        document.getElementById('destInput').addEventListener('input', renderFlights);
        document.getElementById('dateInput').addEventListener('change', renderFlights);
        document.getElementById('budgetInput').addEventListener('input', renderFlights);
        document.getElementById('directCheck').addEventListener('change', renderFlights);
        document.getElementById('sortSelect').addEventListener('change', renderFlights);

        window.onload = loadFlights;
    </script>
</body>
</html>
