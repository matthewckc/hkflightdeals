<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球平價機票追蹤監控面板</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .tab-active {
            border-bottom-width: 4px;
            border-color: #ef4444;
            color: #ef4444;
            font-weight: 700;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-12">

    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <i class="fa-solid fa-plane-departure text-red-500 text-2xl"></i>
                    <span class="text-xl font-black text-gray-800 tracking-wider">FLIGHTS SPY</span>
                </div>
                <div class="text-sm text-gray-500 id="update-time">每晚 00:00 自動更新</div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
        
        <div class="flex border-b border-gray-200 mb-8 bg-white rounded-t-lg shadow-sm">
            <button id="tab-all" onclick="switchTab('all')" class="flex-1 py-4 text-center text-gray-600 hover:text-red-500 font-medium transition-all duration-200 tab-active">
                <i class="fa-solid fa-globe mr-2"></i>全部地區機票
            </button>
            <button id="tab-deals" onclick="switchTab('deals')" class="flex-1 py-4 text-center text-gray-600 hover:text-red-600 font-medium transition-all duration-200">
                <i class="fa-solid fa-fire- flame text-red-500 mr-2"></i>🔥 特惠機票 (看最低價/地區)
            </button>
        </div>

        <div id="flight-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12">
                <i class="fa-solid fa-circle-notch animate-spin text-4xl text-red-500 mb-4"></i>
                <p class="text-gray-500">正在從 Supabase 捕捉最新平價機票...</p>
            </div>
        </div>
    </main>

    <script>
        // 🔧 請替換成你自己的 Supabase 設定
        const SUPABASE_URL = "YOUR_SUPABASE_URL"; 
        const SUPABASE_KEY = "YOUR_SUPABASE_KEY";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allFlights = [];
        let currentTab = 'all'; // 'all' 或 'deals'

        // 撈取資料庫數據
        async function fetchFlights() {
            try {
                const { data, error } = await supabase
                    .from('flight_deals')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                allFlights = data || [];
                renderFlights();
            } catch (err) {
                console.error("讀取失敗:", err);
                document.getElementById('flight-container').innerHTML = `
                    <div class="col-span-full text-center py-12 text-red-500">
                        <i class="fa-solid fa-circle-exclamation text-4xl mb-2"></i>
                        <p>資料讀取失敗，請檢查 Supabase 連線設定。</p>
                    </div>`;
            }
        }

        // 🌟 標籤切換邏輯
        function switchTab(tab) {
            currentTab = tab;
            
            // 切換按鈕樣式
            document.getElementById('tab-all').classList.toggle('tab-active', tab === 'all');
            document.getElementById('tab-deals').classList.toggle('tab-active', tab === 'deals');
            
            renderFlights();
        }

        // 🎨 渲染卡片至網頁
        function renderFlights() {
            const container = document.getElementById('flight-container');
            container.innerHTML = '';

            let displayFlights = [...allFlights];

            // 💡 如果選取「特惠機票」標籤：將價格由低到高嚴格排序，突出最低票價與地區
            if (currentTab === 'deals') {
                displayFlights.sort((a, b) => a.price - b.price);
            }

            if (displayFlights.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12 text-gray-400">
                        <i class="fa-solid fa-folder-open text-4xl mb-2"></i>
                        <p>目前暫無相關機票數據。</p>
                    </div>`;
                return;
            }

            displayFlights.forEach(flight => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow duration-300 flex flex-col justify-between";
                
                // 🛫 格式化日期
                const depDate = new Date(flight.departure_date).toLocaleDateString('zh-HK', {month:'short', day:'numeric', weekday:'short'});
                const retDate = new Date(flight.return_date).toLocaleDateString('zh-HK', {month:'short', day:'numeric', weekday:'short'});

                card.innerHTML = `
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-4">
                            <span class="bg-gray-100 text-gray-700 text-xs px-2.5 py-1 rounded-full font-medium">
                                <i class="fa-solid fa-map-pin mr-1 text-gray-400"></i>${flight.region || '其他區域'}
                            </span>
                            <span class="bg-red-50 text-red-600 text-xs px-2.5 py-1 rounded-full font-bold border border-red-100 animate-pulse">
                                🔥 特惠精選
                            </span>
                        </div>

                        <div class="flex items-center justify-between mb-4">
                            <div class="text-center">
                                <p class="text-2xl font-black text-gray-800 tracking-wide">${flight.origin}</p>
                                <p class="text-xs text-gray-400">香港</p>
                            </div>
                            <div class="flex flex-col items-center flex-1 px-4">
                                <span class="text-xs text-gray-400 font-medium mb-1">${flight.duration_days} 天行程</span>
                                <div class="w-full h-0.5 bg-gray-200 relative">
                                    <div class="absolute -top-1 left-1/2 transform -translate-x-1/2 bg-white px-1">
                                        <i class="fa-solid fa-plane text-gray-300 text-xs"></i>
                                    </div>
                                </div>
                                <span class="text-xs ${flight.is_direct ? 'text-green-600 font-semibold' : 'text-gray-400'} mt-1">
                                    ${flight.is_direct ? '直飛航班' : '需轉機'}
                                </span>
                            </div>
                            <div class="text-center">
                                <p class="text-2xl font-black text-gray-800 tracking-wide">${flight.destination}</p>
                                <p class="text-xs text-red-500 font-bold">${flight.destination_name || '目的地'}</p>
                            </div>
                        </div>

                        <div class="bg-gray-50 rounded-lg p-3 text-sm text-gray-600 space-y-1">
                            <div class="flex justify-between"><span class="text-gray-400">去程：</span><span class="font-medium">${depDate}</span></div>
                            <div class="flex justify-between"><span class="text-gray-400">回程：</span><span class="font-medium">${retDate}</span></div>
                        </div>
                    </div>

                    <div class="px-6 pb-6 pt-2 border-t border-gray-50 flex items-center justify-between">
                        <div>
                            <span class="text-xs text-gray-400 block">最平票價 (往返連稅)</span>
                            <span class="inline-block bg-red-600 text-white font-black text-xl px-3 py-1 rounded shadow-sm mt-1">
                                HK$ ${Number(flight.price).toLocaleString()}
                            </span>
                        </div>
                        <a href="${flight.booking_url}" target="_blank" class="bg-gray-900 hover:bg-red-600 text-white text-sm font-bold px-4 py-2.5 rounded-lg shadow-sm hover:shadow transition-all duration-200">
                            立即開票 <i class="fa-solid fa-arrow-right text-xs ml-1"></i>
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 頁面初始化
        window.onload = fetchFlights;
    </script>
</body>
</html>
